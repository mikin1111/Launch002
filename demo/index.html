<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设计规范总览 · Design Guidelines Demo</title>
  <style>
    :root {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F6F7;
      --bg-tertiary: #F2F3F4;
      --text-primary: #070808;
      --text-secondary: #84888C;
      --text-tertiary: #A0A3A7;
      --line-divider: #F2F3F4;
      --line-border-strong: #DFE0E2;
      --cmpt-active: #303236;
      --font-main: Switzer, -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-main);
      background: var(--bg-secondary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .top-bar {
      flex-shrink: 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--line-border-strong);
      padding: 16px 24px 0;
      z-index: 10;
    }

    .top-bar__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .top-bar__title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .top-bar__badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      padding: 2px 10px;
      border-radius: 99px;
    }

    .tab-nav {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 0;
    }

    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      font-family: var(--font-main);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      padding: 8px 16px 12px;
      cursor: pointer;
      position: relative;
      white-space: nowrap;
      transition: color 150ms ease;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.is-active {
      color: var(--cmpt-active);
      font-weight: 600;
    }

    .tab-btn.is-active::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 0;
      height: 2px;
      background: var(--cmpt-active);
      border-radius: 1px 1px 0 0;
    }

    .content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .content-area iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: var(--bg-primary);
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar__header">
      <h1 class="top-bar__title">设计规范总览</h1>
      <span class="top-bar__badge">15 组件</span>
    </div>
    <nav class="tab-nav" role="tablist" aria-label="组件分类导航">
      <button type="button" class="tab-btn is-active" role="tab" aria-selected="true" data-src="color.html">Color</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="font.html">Font</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="spacing.html">Spacing</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="icon.html">Icon</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="divider.html">Divider</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="button.html">Button</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="checkbox.html">Checkbox</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="tabs.html">Tabs</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="tag.html">Tag</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="select.html">Select</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="search.html">Search</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="faq.html">FAQ</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="header-footer.html">Header/Footer</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="cointitle.html">CoinTitle</button>
      <button type="button" class="tab-btn" role="tab" aria-selected="false" data-src="numberview.html">NumberView</button>
    </nav>
  </div>
  <div class="content-area">
    <iframe id="contentFrame" src="color.html" title="组件预览"></iframe>
  </div>

  <script>
    (function () {
      var frame = document.getElementById('contentFrame');
      var tabs = document.querySelectorAll('.tab-btn');

      tabs.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var src = this.getAttribute('data-src');
          if (!src) return;

          tabs.forEach(function (b) {
            b.classList.remove('is-active');
            b.setAttribute('aria-selected', 'false');
          });
          this.classList.add('is-active');
          this.setAttribute('aria-selected', 'true');

          frame.src = src;
        });
      });

      document.addEventListener('keydown', function (e) {
        var active = document.querySelector('.tab-btn.is-active');
        if (!active) return;
        var allTabs = Array.prototype.slice.call(tabs);
        var idx = allTabs.indexOf(active);

        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          var next = allTabs[(idx + 1) % allTabs.length];
          next.click();
          next.focus();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          var prev = allTabs[(idx - 1 + allTabs.length) % allTabs.length];
          prev.click();
          prev.focus();
        }
      });
    })();
  </script>
</body>
</html>
